<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Workspace</title>
    <style>
        /* Core Minimalist Layout Styles */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: #8e9297;
            --border-color: #1c1c1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout Config */
        .navbar {
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            color: var(--text-white);
        }

        /* Inline SVG Vector Sizing Config */
        .nav-icon {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-download {
            background-color: var(--text-white);
            color: var(--bg-black);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        /* Profile Split Container */
        .portfolio-main-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            flex-grow: 1;
            padding: 140px 40px 60px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            gap: 40px;
        }

        .profile-text-side {
            flex: 1;
        }

        /* Elegant Seriffed Profile Name */
        .portfolio-main-title {
            font-size: 4.8rem;
            font-family: 'Georgia', Garamond, serif;
            font-style: italic;
            font-weight: 400;
            margin: 0 0 15px 0;
            background: linear-gradient(to right, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Uppercase Tracking Subtitle Subheader */
        .profile-subtitle {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-white);
            margin-bottom: 25px;
        }

        /* Content Break Separator Line */
        .profile-divider {
            border: none;
            height: 1px;
            background-color: var(--border-color);
            width: 100%;
            margin-bottom: 25px;
        }

        /* Avatar Container Config */
        .profile-avatar-side {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .large-profile-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }

        /* Tiny Est Timestamp Label */
        .est-timestamp {
            position: fixed;
            bottom: 25px;
            right: 40px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #36393f;
            text-transform: uppercase;
        }

        /* Responsive Mobile Layout Breakpoint Override */
        @media (max-width: 768px) {
            .portfolio-main-hero {
                flex-direction: column-reverse;
                text-align: center;
                padding-top: 120px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-right">
            <a href="https://discord.com" target="_blank" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                Discord
            </a>
            <a href="https://github.com" target="_blank" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    GitHub
            </a>
            <a href="#donate" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                Donate
            </a>
            <a href="#download" class="btn-download">
                <svg class="nav-icon" style="stroke: #000000;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                Download
            </a>
        </div>
    </nav>

    <!-- MAIN PROFILE HERO BLOCK -->
    <header class="portfolio-main-hero">
        
        <!-- LEFT SIDE CONTENT PANEL -->
        <div class="profile-text-side">
            <!-- HEADLINE CHANGED SPECIFICALLY FROM TEMMIE TO KLLDYLL -->
            <h1 class="portfolio-main-title">kxlldyll</h1>
            <p class="profile-subtitle">Software Engineer & Digital Asset Specialist</p>
            <div class="profile-divider"></div>
        </div>

        <!-- RIGHT SIDE AVATAR IMG PANEL -->
        <div class="profile-avatar-side">
            <img src="template-avatar.png" alt="Profile Avatar" class="large-profile-avatar">
        </div>

    </header>

    <div class="est-timestamp">Est. 2026</div>

    <script>
        /* Interactive Scrolling FX */
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.style.borderBottom = '1px solid var(--border-color)';
            } else {
                navbar.style.borderBottom = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>KYXS Portfolio</title> 
    <meta name="cache-control" content="no-cache, no-store, must-revalidate"> 
    <style> 
        /* Core Minimalist Layout Styles */ 
        :root { 
            --bg-black: #000000; 
            --text-white: #ffffff; 
            --text-muted: #8e9297; 
            --border-color: #1c1c1f; 
        } 

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 

        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow: hidden; /* Lock viewport completely until interaction executes */ 
        } 

        /* Click to Reveal Intro Screen overlay */ 
        .intro-screen-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #0b0b0c; /* Matte gray intro shield */ 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            cursor: pointer; 
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s; 
        } 

        /* Forces a clean, hardware-accelerated fade out */ 
        .intro-screen-overlay.fade-out-complete { 
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none; 
        } 

        /* Lowercase Cursive Title */ 
        .intro-screen-title { 
            font-size: 4.8rem; 
            font-family: 'Georgia', Garamond, serif; 
            font-style: italic; 
            font-weight: 400; 
            color: #a4a7ac; 
            margin-bottom: 25px; 
            letter-spacing: -1px; 
            text-transform: lowercase; 
        } 

        /* Thin horizontal layout separator line */ 
        .intro-screen-divider { 
            width: 30px; 
            height: 1px; 
            background-color: #2a2b2d; 
            margin-bottom: 25px; 
        } 

        /* Tracking Prompt Text */ 
        .intro-screen-prompt { 
            font-size: 0.75rem; 
            font-weight: 500; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            color: #4a4d52; 
            transition: color 0.2s ease; 
        } 

        .intro-screen-overlay:hover .intro-screen-prompt { 
            color: #8e9297; 
        } 

        /* Core Portfolio Content Panel */ 
        .kyxs-core-layout { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            justify-content: center; 
            flex-grow: 1; 
            padding: 40px; 
            max-width: 900px; 
            width: 100%; 
            margin: 0 auto; 
            /* Initial visibility parameters before interaction */ 
            opacity: 0; 
            transform: scale(0.98); 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        } 

        /* Global transition active execution hook states */ 
        body.content-revealed-active { 
            overflow: visible; /* Unlock user browsing inputs */ 
        } 

        body.content-revealed-active .kyxs-core-layout { 
            opacity: 1; 
            transform: scale(1); 
        } 

        /* Premium Silver Finished Heading */ 
        .kyxs-main-title { 
            font-size: 4.8rem; 
            font-family: 'Georgia', Garamond, serif; 
            font-style: italic; 
            font-weight: 400; 
            margin: 0 0 20px 0; 
            background: linear-gradient(to right, #ffffff 40%, #777777 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: inline-block; 
        } 

        .profile-subtitle { 
            font-size: 0.8rem; 
            font-weight: 600; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            margin-bottom: 25px; 
        } 

        .profile-divider { 
            border: none; 
            height: 1px; 
            background-color: #1c1c1f; 
            width: 100%; 
            margin-bottom: 25px; 
        } 

        .tech-stack-row { 
            font-family: 'Georgia', Garamond, serif; 
            font-style: italic; 
            color: var(--text-muted); 
            font-size: 1rem; 
            display: flex; 
            gap: 15px; 
            margin-bottom: 30px; 
        } 

        .services-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 35px; 
        } 

        .service-item { 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        } 

        .service-item::before { 
            content: "—"; 
            color: #4f545c; 
        } 

        .profile-directory-footer { 
            display: flex; 
            gap: 25px; 
        } 

        .directory-link { 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: var(--text-muted); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 500; 
            transition: color 0.2s ease; 
        } 

        .directory-link:hover { 
            color: var(--text-white); 
        } 

        .nav-icon { 
            width: 16px; 
            height: 16px; 
            stroke: currentColor; 
            fill: none; 
            stroke-width: 2; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
        } 

        .est-timestamp { 
            position: fixed; 
            bottom: 25px; 
            right: 40px; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
            color: #36393f; 
            text-transform: uppercase; 
        } 

        @media (max-width: 768px) { 
            .kyxs-core-layout { 
                align-items: center; 
                text-align: center; 
            } 
            .tech-stack-row, .profile-directory-footer { 
                justify-content: center; 
            } 
            .service-item { 
                justify-content: center; 
            } 
        } 
    </style>
</head>
<body> 

    <!-- OVERLAY SHIELD PANEL --> 
    <div id="clickGateway" class="intro-screen-overlay"> 
        <div class="intro-screen-title">kyxs</div> 
        <div class="intro-screen-divider"></div> 
        <div class="intro-screen-prompt">Click to reveal</div> 
    </div> 

    <!-- MAIN INTERFACE CONTAINER --> 
    <main class="kyxs-core-layout"> 
        <h1 class="kyxs-main-title">KYXS</h1> 
        <p class="profile-subtitle">DEVELOPER</p> 
        
        <div class="profile-divider"></div> 
        
        <div class="tech-stack-row"> 
            <span>Luau</span> 
            <span>JavaScript</span> 
            <span>CSS</span> 
        </div> 
        
        <div class="services-list"> 
            <div class="service-item">Website Developer, multiple languages</div> 
            <div class="service-item">Staff @ RoCheats</div> 
            <div class="service-item">Aged Roblox Account seller</div> 
        </div> 
        
        <div class="profile-directory-footer"> 
            <a href="#contact" class="directory-link"> 
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg> 
                CONTACT 
            </a> 
            <a href="https://github.com" target="_blank" class="directory-link"> 
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6-3.49z"></path>
                </svg> 
                GITHUB 
            </a>
        </div> 
    </main>

    <!-- INLINE ENGINE LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gateway = document.getElementById('clickGateway');
            if (gateway) {
                gateway.addEventListener('click', () => {
                    gateway.classList.add('fade-out-complete');
                    document.body.classList.add('content-revealed-active');
                });
            }
        });
    </script>
</body>
</html>

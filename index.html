<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* Core Minimalist Layout Styles */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: #8e9297;
            --border-color: #202225;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout Config */
        .navbar {
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            color: var(--text-white);
        }

        /* Inline SVG Vector Sizing Config */
        .nav-icon {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-download {
            background-color: var(--text-white);
            color: var(--bg-black);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        /* Hero Text Styles */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
            padding: 140px 20px 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 4.8rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(to right, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .os-availability {
            font-size: 0.8rem;
            color: #4f545c;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-right">
            <!-- Discord Link with Embedded Raw Vector Code -->
            <a href="https://discord.com" target="_blank" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                Discord
            </a>
            
            <!-- GitHub Link with Embedded Raw Vector Code -->
            <a href="https://github.com" target="_blank" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                GitHub
            </a>
            
            <!-- Donate Link with Embedded Raw Vector Code -->
            <a href="#donate" class="nav-link">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                Donate
            </a>
            
            <!-- Download Button with Embedded Raw Vector Code -->
            <a href="#download" class="btn-download">
                <svg class="nav-icon" style="stroke: #000000;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                Download
            </a>
        </div>
    </nav>

    <header class="hero-section">
        <!-- HEADLINE UPDATED TO PORTFOLIO WELCOME -->
        <h1 class="hero-title">Welcome to my portfolio!</h1>
        <p class="os-availability">Available on Windows, macOS and Linux.</p>
    </header>

    <script>
        /* Interactive Scrolling FX */
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.style.borderBottom = '1px solid #202225';
            } else {
                navbar.style.borderBottom = 'none';
            }
        });
    </script>
</body>
</html>

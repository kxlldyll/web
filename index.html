<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYXS Portfolio</title>
    <style>
        /* Core Minimalist Layout Styles */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: #8e9297;
            --border-color: #1c1c1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main Center Workspace Layout */
        .portfolio-main-hero {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            flex-grow: 1;
            padding: 60px 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .profile-text-side {
            flex: 1;
        }

        /* Elegant Seriffed Profile Name (Cursive-style Gradient Serif) */
        .portfolio-main-title {
            font-size: 4.8rem;
            font-family: 'Georgia', Garamond, serif;
            font-style: italic;
            font-weight: 400;
            margin: 0 0 20px 0;
            background: linear-gradient(to right, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Uppercase Tracking Subtitle Subheader */
        .profile-subtitle {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* Content Break Separator Line */
        .profile-divider {
            border: none;
            height: 1px;
            background-color: #1c1c1f;
            width: 100%;
            margin-bottom: 25px;
        }

        /* Tech Badges Inline Stack */
        .tech-stack-row {
            font-family: 'Georgia', Garamond, serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 1rem;
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Services Descriptive Overview Lines */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .service-item {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .service-item::before {
            content: "—";
            color: #4f545c;
        }

        /* Profile Lower Directory Links Row */
        .profile-directory-footer {
            display: flex;
            gap: 25px;
        }

        .directory-link {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .directory-link:hover {
            color: var(--text-white);
        }

        /* Inline SVG Vector Sizing Config */
        .nav-icon {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Tiny Est Timestamp Label */
        .est-timestamp {
            position: fixed;
            bottom: 25px;
            right: 40px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #36393f;
            text-transform: uppercase;
        }

        /* Responsive Mobile Breakpoint Override */
        @media (max-width: 768px) {
            .portfolio-main-hero {
                text-align: center;
            }
            .tech-stack-row, .profile-directory-footer {
                justify-content: center;
            }
            .service-item {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION BAR REMOVED COMPLETELY TO CLEAN THE LAYOUT -->

    <!-- MAIN PROFILE HERO BLOCK -->
    <header class="portfolio-main-hero">
        <div class="profile-text-side">
            <h1 class="portfolio-main-title">KYXS</h1>
            <p class="profile-subtitle">DEVELOPER</p>
            
            <div class="profile-divider"></div>
            
            <div class="tech-stack-row">
                <span>Luau</span>
                <span>JavaScript</span>
                <span>CSS</span>
            </div>
            
            <div class="services-list">
                <div class="service-item">Account Selling</div>
                <div class="service-item">Staff @ RoCheats</div>
            </div>
            
            <div class="profile-directory-footer">
                <a href="#contact" class="directory-link">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    CONTACT
                </a>
                <a href="https://github.com" target="_blank" class="directory-link">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                    GITHUB
                </a>
                <a href="https://discord.com" target="_blank" class="directory-link">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    DISCORD
                </a>
            </div>
        </div>
    </header>

    <div class="est-timestamp">Est. 2026</div>

</body>
</html>

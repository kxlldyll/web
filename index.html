<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        /* Core Minimalist Layout Styles */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: #8e9297;
            --border-color: #202225;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout Config */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Avatar Corner Styling */
        .nav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-center {
            display: flex;
            gap: 30px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text-white);
        }

        .btn-download {
            background-color: var(--text-white);
            color: var(--bg-black);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            transition: opacity 0.2s ease;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        /* Hero Text Styles */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
            padding: 140px 20px 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 4.8rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 24px;
            
            /* FIXED METALLIC GRADIENT CONFIGURATION */
            background: linear-gradient(to right, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 500px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .hero-tagline {
            font-size: 0.95rem;
            color: #4f545c;
            margin-bottom: 40px;
        }

        /* Action Buttons Row */
        .cta-group {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-white {
            background-color: var(--text-white);
            color: var(--bg-black);
        }

        .btn-white:hover {
            background-color: #e3e5e8;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-white);
            border: 1px solid #36393f;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #72767d;
        }

        .os-availability {
            font-size: 0.8rem;
            color: #4f545c;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <!-- Make sure your red sketch file is uploaded as avatar.png -->
                <img src="avatar.png" alt="Avatar" class="nav-avatar">
                Sincord
            </div>
        </div>
        <div class="nav-center">
            <a href="#plugins" class="nav-link">Plugins</a>
            <a href="#cloud" class="nav-link">Cloud</a>
            <a href="#download" class="nav-link">Download</a>
        </div>
        <div class="nav-right">
            <a href="https://discord.com" target="_blank" class="nav-link text-link">Discord</a>
            <a href="https://github.com" target="_blank" class="nav-link text-link">GitHub</a>
            <a href="#donate" class="nav-link text-link">Donate</a>
            <a href="#download" class="btn-download">Download</a>
        </div>
    </nav>

    <header class="hero-section">
        <!-- TITLE WITH SMOOTH METALLIC SHINE -->
        <h1 class="hero-title">Welcome to my website.</h1>
        <p class="hero-subtitle">A fork that offers a wider selection of plugins from the community.</p>
        <p class="hero-tagline">The feature-rich fork of Vencord.</p>
        
        <div class="cta-group">
            <a href="#download" class="btn btn-white">↓ Download</a>
            <a href="https://github.com" target="_blank" class="btn btn-outline">Source Code</a>
        </div>
        
        <p class="os-availability">Available on Windows, macOS and Linux.</p>
    </header>

    <script>
        /* Interactive Scrolling FX */
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.style.borderBottom = '1px solid #202225';
            } else {
                navbar.style.borderBottom = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my portfolio :3</title>
    <style>
        /* Core Minimalist Layout Styles */
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: #8e9297;
            --border-color: #202225;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout Config */
        .navbar {
            display: flex;
            justify-content: flex-end; /* ALIGNS LINKS PERFECTLY TO THE RIGHT */
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: var(--text-white);
        }

        .btn-download {
            background-color: var(--text-white);
            color: var(--bg-black);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 4px;
            transition: opacity 0.2s ease;
        }

        .btn-download:hover {
            opacity: 0.9;
        }

        /* Hero Text Styles */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
            padding: 140px 20px 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 4.8rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin: 0;
            
            /* METALLIC GRADIENT CONFIGURATION */
            background: linear-gradient(to right, #ffffff 40%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .os-availability {
            font-size: 0.8rem;
            color: #4f545c;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <!-- LEFT CONTAINER STRIPPED TO COMPLETELY KILL THE LINGERING ALIEN IMAGE ELEMENTS -->
        <div class="nav-right">
            <a href="https://discord.com" target="_blank" class="nav-link text-link">Discord</a>
            <a href="https://github.com" target="_blank" class="nav-link text-link">GitHub</a>
            <a href="#donate" class="nav-link text-link">Donate</a>
            <a href="#download" class="btn-download">Download</a>
        </div>
    </nav>

    <header class="hero-section">
        <h1 class="hero-title">Welcome to my website.</h1>
        <p class="os-availability">Available on Windows, macOS and Linux.</p>
    </header>

    <script>
        /* Interactive Scrolling FX */
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.style.borderBottom = '1px solid #202225';
            } else {
                navbar.style.borderBottom = 'none';
            }
        });
    </script>
</body>
</html>
